<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bgGradFav" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#2D8C7A"/>
      <stop offset="100%" stop-color="#1E6B5E"/>
    </radialGradient>
    <radialGradient id="goldFav" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </radialGradient>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="16" cy="16" r="16" fill="url(#bgGradFav)"/>

  <!-- Contour coquille (léger) -->
  <path d="
    M 16 27
    C 9 27, 4 22, 3.5 16
    C 3 11, 5.5 7, 9.5 5
    C 11.5 4, 14 3.5, 16 3.5
    C 18 3.5, 20.5 4, 22.5 5
    C 26.5 7, 29 11, 28.5 16
    C 28 22, 23 27, 16 27 Z
  " fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.20)" stroke-width="0.5"/>

  <!-- Charnière -->
  <path d="M 12 27 Q 16 29.5 20 27" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.6" stroke-linecap="round"/>

  <!-- 7 stries neuronales simplifiées pour petite taille -->
  <path d="M 14.2 27 C 7 23, 4.5 17, 5.8 9"  fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M 14.8 27 C 9 21, 7 16, 8.5 7"    fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M 15.4 27 C 11.5 21, 10 14, 11.5 5" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M 16 27 C 16 20.5, 16 13, 16 4.5" fill="none" stroke="rgba(255,255,255,0.48)" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M 16.6 27 C 20.5 21, 22 14, 20.5 5" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="0.7" stroke-linecap="round"/>
  <path d="M 17.2 27 C 23 21, 25 16, 23.5 7"  fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.6" stroke-linecap="round"/>
  <path d="M 17.8 27 C 25 23, 27.5 17, 26.2 9" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Synapses dorées — rangée médiane (minimaliste à 32px) -->
  <circle cx="7"  cy="16" r="0.9" fill="#F0A500" opacity="0.80"/>
  <circle cx="10" cy="15" r="1.0" fill="#F0A500" opacity="0.85"/>
  <circle cx="13" cy="14.5" r="1.0" fill="#F0A500" opacity="0.85"/>
  <circle cx="16" cy="14.5" r="1.1" fill="#F0A500" opacity="0.90"/>
  <circle cx="19" cy="14.5" r="1.0" fill="#F0A500" opacity="0.85"/>
  <circle cx="22" cy="15" r="1.0" fill="#F0A500" opacity="0.85"/>
  <circle cx="25" cy="16" r="0.9" fill="#F0A500" opacity="0.80"/>

  <!-- Point Santiago (haut) -->
  <circle cx="16" cy="4.5" r="2.8" fill="#F0A500" opacity="0.25"/>
  <circle cx="16" cy="4.5" r="1.8" fill="#F0A500" opacity="0.50"/>
  <circle cx="16" cy="4.5" r="1.1" fill="url(#goldFav)"/>
  <circle cx="15.4" cy="4" r="0.4" fill="white" opacity="0.70"/>
