<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 624" width="1640" height="624">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a2018"/>
      <stop offset="45%"  stop-color="#1E6B5E"/>
      <stop offset="100%" stop-color="#0d1f2d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </linearGradient>
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#2D8C7A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a2018" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="logoGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#2D8C7A"/>
      <stop offset="100%" stop-color="#1E6B5E"/>
    </radialGradient>
    <radialGradient id="golddot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundedBg">
      <rect width="1640" height="624" rx="0"/>
    </clipPath>
  </defs>

  <!-- Fond principal -->
  <rect width="1640" height="624" fill="url(#bg)"/>
  <rect width="1640" height="624" fill="url(#bgGrad)"/>

  <!-- Lignes décoratives — chemin / route ondulante -->
  <path d="M -50 500 Q 200 350, 420 420 Q 650 490, 820 380 Q 990 270, 1200 340 Q 1420 410, 1700 280"
        fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
  <path d="M -50 500 Q 200 350, 420 420 Q 650 490, 820 380 Q 990 270, 1200 340 Q 1420 410, 1700 280"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- Cercles décoratifs subtils -->
  <circle cx="1480" cy="100" r="200" fill="rgba(240,165,0,0.04)"/>
  <circle cx="1480" cy="100" r="130" fill="rgba(240,165,0,0.05)"/>
  <circle cx="200" cy="550" r="160" fill="rgba(45,140,122,0.08)"/>

  <!-- ═══ LOGO ICON (gauche) ═════════════════════════════ -->
  <g transform="translate(80, 162) scale(3)">
    <!-- Fond circulaire -->
    <circle cx="50" cy="50" r="50" fill="url(#logoGrad)"/>
    <!-- Contour coquille -->
    <path d="M 50 82 C 30 82,14 68,12 50 C 10 35,18 22,30 16 C 37 12,44 11,50 11 C 56 11,63 12,70 16 C 82 22,90 35,88 50 C 86 68,70 82,50 82 Z"
          fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.20)" stroke-width="0.8"/>
    <path d="M 38 82 Q 50 88 62 82" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>
    <!-- Stries neuronales -->
    <path d="M 44 82 C 22 72,14 55,18 28" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M 46 82 C 28 68,22 50,26 22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M 48 82 C 36 66,32 46,36 16" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 50 82 C 50 64,50 42,50 14"  fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M 52 82 C 64 66,68 46,64 16" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M 54 82 C 72 68,78 50,74 22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.0" stroke-linecap="round"/>
    <path d="M 56 82 C 78 72,86 55,82 28" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>
    <!-- Synapses dorées -->
    <circle cx="28" cy="62" r="1.8" fill="#F0A500" opacity="0.85" filter="url(#glow)"/>
    <circle cx="50" cy="70" r="1.6" fill="#F0A500" opacity="0.80"/>
    <circle cx="72" cy="62" r="1.8" fill="#F0A500" opacity="0.85" filter="url(#glow)"/>
    <circle cx="22" cy="50" r="1.5" fill="#F0A500" opacity="0.65"/>
    <circle cx="50" cy="46" r="1.8" fill="#F0A500" opacity="0.85" filter="url(#glow)"/>
    <circle cx="78" cy="50" r="1.5" fill="#F0A500" opacity="0.65"/>
    <circle cx="50" cy="26" r="1.7" fill="#F0A500" opacity="0.75"/>
    <!-- Point Santiago -->
    <circle cx="50" cy="14" r="7"   fill="#F0A500" opacity="0.18" filter="url(#softglow)"/>
    <circle cx="50" cy="14" r="4.5" fill="#F0A500" opacity="0.30"/>
    <circle cx="50" cy="14" r="3.2" fill="url(#golddot)"/>
    <circle cx="48.8" cy="13" r="1.0" fill="white" opacity="0.70"/>
  </g>

  <!-- Séparateur vertical -->
  <rect x="400" y="160" width="1.5" height="300" fill="rgba(255,255,255,0.12)"/>

  <!-- ═══ TEXTE (droite du logo) ════════════════════════ -->

  <!-- "La" -->
  <text x="440" y="246"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34" font-style="italic"
        fill="rgba(255,255,255,0.55)">La</text>

  <!-- "Neuro-Odyssée" -->
  <text x="440" y="350"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="108" font-weight="700"
        fill="white" letter-spacing="-1">Neuro-Odyssée</text>

  <!-- Ligne or -->
  <rect x="440" y="372" width="100" height="2.5" fill="url(#gold)" rx="1"/>

  <!-- Tagline principale -->
  <text x="440" y="424"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="28" font-style="italic"
        fill="rgba(255,255,255,0.72)">1 600 km pour re-câbler un cerveau marqué par le TDAH</text>

  <!-- Route -->
  <text x="440" y="472"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19" letter-spacing="3.5"
        fill="rgba(255,255,255,0.40)">ST-MAURICE · SUISSE  →  SANTIAGO DE COMPOSTELA</text>

  <!-- Ligne séparatrice fine -->
  <rect x="440" y="494" width="760" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- URL + hashtag -->
  <text x="440" y="530"
        font-family="Arial, Helvetica, sans-serif"
        font-size="21" letter-spacing="1"
        fill="rgba(240,165,0,0.80)">www.neuro-odyssee.com</text>

  <text x="760" y="530"
        font-family="Arial, Helvetica, sans-serif"
        font-size="21" letter-spacing="1"
        fill="rgba(255,255,255,0.30)">  ·  #LaNeuroOdyssee  ·  #Compostelle</text>

  <!-- Point lumineux Santiago en haut à droite -->
  <circle cx="1560" cy="80" r="40" fill="rgba(240,165,0,0.08)" filter="url(#softglow)"/>
  <circle cx="1560" cy="80" r="18" fill="rgba(240,165,0,0.15)"/>
  <circle cx="1560" cy="80" r="8"  fill="rgba(240,165,0,0.50)"/>
  <circle cx="1560" cy="80" r="3"  fill="#F0A500"/>

  <!-- Ligne chemin vers Santiago -->
  <path d="M 440 530 Q 900 560 1558 84"
        fill="none" stroke="rgba(240,165,0,0.12)" stroke-width="1.5" stroke-dasharray="8,6"/>

</svg>
