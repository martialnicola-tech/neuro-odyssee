<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- ── Cerveau stylisé (vue de dessus, 2 lobes) ── -->
  <path d="
    M 50 87
    C 38 89, 14 79, 10 63
    C 5  47, 11 33, 21 26
    C 19 16, 25  7, 34  7
    C 38  3, 45  4, 48  9
    C 49  7, 50  5, 50  5
    C 50  5, 51  7, 52  9
    C 55  4, 62  3, 66  7
    C 75  7, 81 16, 79 26
    C 89 33, 95 47, 90 63
    C 86 79, 62 89, 50 87 Z
  " fill="#1E6B5E"/>

  <!-- Texture : quelques gyri (bosses du cerveau) -->
  <path d="M 11 52 C  7 47,  7 41, 11 38" stroke="#2D8C7A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 89 52 C 93 47, 93 41, 89 38" stroke="#2D8C7A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 19 26 C 16 20, 19 13, 24 11" stroke="#2D8C7A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 81 26 C 84 20, 81 13, 76 11" stroke="#2D8C7A" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Scissure longitudinale (centre) -->
  <path d="M 50 5 C 49 32, 49 62, 50 87"
        stroke="#2D8C7A" stroke-width="1.6" fill="none" opacity="0.55"/>

  <!-- ── Chemin neural = la route de Compostelle ── -->
  <path d="M 22 68 C 22 44, 42 44, 50 50 C 58 56, 78 56, 78 32"
        stroke="white" stroke-width="3.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nœuds secondaires -->
  <circle cx="34" cy="48" r="2.2" fill="white" opacity="0.35"/>
  <circle cx="66" cy="52" r="2.2" fill="white" opacity="0.35"/>

  <!-- Point départ — St-Maurice -->
  <circle cx="22" cy="68" r="5.5" fill="white" opacity="0.9"/>
  <circle cx="22" cy="68" r="3"   fill="#1E6B5E"/>

  <!-- Point milieu — connexion neurale -->
  <circle cx="50" cy="50" r="4.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="50" r="2"   fill="#1E6B5E"/>

  <!-- Point arrivée — Santiago (or) -->
  <circle cx="78" cy="32" r="7"   fill="#F0A500"/>
  <circle cx="78" cy="32" r="3.5" fill="#fff" opacity="0.35"/>
  <path d="M78 28.5 L79 31 L81.5 31 L79.5 32.8 L80.3 35.5 L78 33.8 L75.7 35.5 L76.5 32.8 L74.5 31 L77 31 Z"
        fill="white" opacity="0.9"/>

</svg>
