<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#2D8C7A"/>
      <stop offset="100%" stop-color="#1E6B5E"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD060"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </radialGradient>
    <filter id="synapseglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="apexglow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond circulaire -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- ══ Coquille Saint-Jacques : forme de base ══ -->
  <!-- Corps de la coquille : éventail depuis la charnière (bas) vers le haut -->
  <path d="
    M 50 82
    C 30 82, 14 68, 12 50
    C 10 35, 18 22, 30 16
    C 37 12, 44 11, 50 11
    C 56 11, 63 12, 70 16
    C 82 22, 90 35, 88 50
    C 86 68, 70 82, 50 82 Z
  " fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Charnière / umbo de la coquille (en bas) -->
  <path d="M 38 82 Q 50 88 62 82" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- ══ 7 stries neuronales : courbes depuis la charnière vers le sommet ══ -->
  <!-- Chaque strie = courbe de Bézier, légèrement différente pour simuler l'éventail -->

  <!-- Strie 1 — extrême gauche -->
  <path d="M 44 82 C 22 72, 14 55, 18 28" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Strie 2 -->
  <path d="M 46 82 C 28 68, 22 50, 26 22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Strie 3 -->
  <path d="M 48 82 C 36 66, 32 46, 36 16" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Strie 4 — centrale (la plus visible) -->
  <path d="M 50 82 C 50 64, 50 42, 50 14" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Strie 5 -->
  <path d="M 52 82 C 64 66, 68 46, 64 16" fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Strie 6 -->
  <path d="M 54 82 C 72 68, 78 50, 74 22" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.0" stroke-linecap="round"/>
  <!-- Strie 7 — extrême droite -->
  <path d="M 56 82 C 78 72, 86 55, 82 28" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="1.0" stroke-linecap="round"/>

  <!-- ══ Synapses dorées aux intersections horizontales ══ -->
  <!-- Rangée basse ~68% -->
  <circle cx="28" cy="62" r="1.8" fill="#F0A500" opacity="0.85" filter="url(#synapseglow)"/>
  <circle cx="36" cy="66" r="1.6" fill="#F0A500" opacity="0.75"/>
  <circle cx="44" cy="69" r="1.5" fill="#F0A500" opacity="0.70"/>
  <circle cx="50" cy="70" r="1.6" fill="#F0A500" opacity="0.80"/>
  <circle cx="56" cy="69" r="1.5" fill="#F0A500" opacity="0.70"/>
  <circle cx="64" cy="66" r="1.6" fill="#F0A500" opacity="0.75"/>
  <circle cx="72" cy="62" r="1.8" fill="#F0A500" opacity="0.85" filter="url(#synapseglow)"/>

  <!-- Rangée médiane ~50% -->
  <circle cx="22" cy="50" r="1.5" fill="#F0A500" opacity="0.65"/>
  <circle cx="30" cy="48" r="1.7" fill="#F0A500" opacity="0.75"/>
  <circle cx="40" cy="46" r="1.6" fill="#F0A500" opacity="0.70"/>
  <circle cx="50" cy="46" r="1.8" fill="#F0A500" opacity="0.80" filter="url(#synapseglow)"/>
  <circle cx="60" cy="46" r="1.6" fill="#F0A500" opacity="0.70"/>
  <circle cx="70" cy="48" r="1.7" fill="#F0A500" opacity="0.75"/>
  <circle cx="78" cy="50" r="1.5" fill="#F0A500" opacity="0.65"/>

  <!-- Rangée haute ~32% -->
  <circle cx="28" cy="34" r="1.4" fill="#F0A500" opacity="0.60"/>
  <circle cx="36" cy="30" r="1.5" fill="#F0A500" opacity="0.65"/>
  <circle cx="44" cy="27" r="1.5" fill="#F0A500" opacity="0.65"/>
  <circle cx="50" cy="26" r="1.7" fill="#F0A500" opacity="0.75"/>
  <circle cx="56" cy="27" r="1.5" fill="#F0A500" opacity="0.65"/>
  <circle cx="64" cy="30" r="1.5" fill="#F0A500" opacity="0.65"/>
  <circle cx="72" cy="34" r="1.4" fill="#F0A500" opacity="0.60"/>

  <!-- ══ Point central or brillant en haut = Santiago / destination ══ -->
  <!-- Halo extérieur -->
  <circle cx="50" cy="14" r="7" fill="#F0A500" opacity="0.20" filter="url(#apexglow)"/>
  <!-- Anneau intermédiaire -->
  <circle cx="50" cy="14" r="5" fill="#F0A500" opacity="0.35"/>
  <!-- Point central or -->
  <circle cx="50" cy="14" r="3.2" fill="url(#goldGlow)"/>
  <!-- Reflet blanc -->
  <circle cx="48.8" cy="13" r="1.0" fill="white" opacity="0.70"/>
</svg>
