<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fond cercle vert profond -->
  <circle cx="50" cy="50" r="48" fill="#1E6B5E"/>

  <!-- Halo extérieur subtil -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#2D8C7A" stroke-width="1.5" opacity="0.5"/>

  <!-- Chemin neural : courbe S évoquant la route ET une synapse -->
  <path d="M 22 68 C 22 44, 42 44, 50 50 C 58 56, 78 56, 78 32"
        stroke="white" stroke-width="3.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Nœuds secondaires (réseau neuronal) -->
  <circle cx="34" cy="48" r="2.2" fill="white" opacity="0.35"/>
  <circle cx="66" cy="52" r="2.2" fill="white" opacity="0.35"/>

  <!-- Point de départ — St-Maurice -->
  <circle cx="22" cy="68" r="5.5" fill="white" opacity="0.9"/>
  <circle cx="22" cy="68" r="3"   fill="#1E6B5E"/>

  <!-- Point milieu — connexion neurale -->
  <circle cx="50" cy="50" r="4.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="50" r="2"   fill="#1E6B5E"/>

  <!-- Point d'arrivée — Santiago (or) -->
  <circle cx="78" cy="32" r="7"   fill="#F0A500"/>
  <circle cx="78" cy="32" r="3.5" fill="#fff" opacity="0.4"/>

  <!-- Étoile stylisée dans le point doré -->
  <path d="M78 28.5 L79 31 L81.5 31 L79.5 32.8 L80.3 35.5 L78 33.8 L75.7 35.5 L76.5 32.8 L74.5 31 L77 31 Z"
        fill="white" opacity="0.85"/>
</svg>
